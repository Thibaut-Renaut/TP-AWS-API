name: Pipeline CICD projet Master

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: master_node_app

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lancer les tests
        run: ls -lah

  build:
    needs: test
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ${{env.IMAGE_NAME}} .

      - name: Run image
        run: docker run -d -p 3000:3000 ${{env.IMAGE_NAME}}

      - name: Test API
        run: curl -f http://localhost:3000
